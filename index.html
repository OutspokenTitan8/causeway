<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f1419" />
  <title>Job Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
  <style>
    :root {
      --bg:#0f1419; --panel:#1a2230; --line:#2a3547; --txt:#e6edf3; --mut:#8b98a9;
      --accent:#3d8bfd; --ok:#2ea043; --warn:#d29922; --err:#f0546c;
      --sheet-h: 42vh;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { margin:0; height:100%; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--txt); }
    #app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

    /* ---------- Header ---------- */
    header { padding:10px 12px; background:var(--panel); border-bottom:1px solid var(--line); display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    header h1 { margin:0; font-size:17px; font-weight:700; }
    .version { font-size:11px; color:var(--mut); font-weight:600; }
    .header-right { margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.05); font-size:12px; color:var(--mut); }
    .pill.alert { border-color:var(--err); color:#fff; background:rgba(240,84,108,.22); font-weight:700; }
    .button, .file-button { border-radius:10px; border:1px solid var(--line); padding:9px 13px; background:var(--bg); color:var(--txt); font-size:13px; font-weight:700; cursor:pointer; }
    .file-button { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* Stale-data banner */
    .stale-bar { display:none; padding:9px 12px; background:rgba(240,84,108,.16); border-bottom:1px solid var(--err); color:#ffd9e0; font-size:12px; font-weight:600; }
    .stale-bar.show { display:block; }

    /* ---------- Map ---------- */
    .map-container { position:relative; flex:1; min-height:120px; }
    #map { width:100%; height:100%; }
    .legend { position:absolute; right:10px; bottom:10px; z-index:500; background:rgba(15,20,25,.9); border:1px solid var(--line); border-radius:10px; padding:8px 10px; display:grid; gap:5px; font-size:11px; }
    .legend span { display:flex; align-items:center; gap:7px; }
    .legend i { width:11px; height:11px; border-radius:50%; display:inline-block; border:1px solid #fff; }

    /* ---------- Drag handle ---------- */
    .drag-bar { height:20px; background:var(--panel); border-top:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:ns-resize; touch-action:none; flex:none; }
    .drag-bar::before { content:''; width:44px; height:4px; border-radius:2px; background:var(--line); }
    .drag-bar:active::before { background:var(--accent); }

    /* ---------- Sheet ---------- */
    .sheet { background:var(--panel); height:var(--sheet-h); display:flex; flex-direction:column; flex:none; overflow:hidden; }
    .sheet.collapsed { height:0; }
    .controls { display:flex; flex-wrap:wrap; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line); flex:none; }
    .controls input, .controls select { min-width:120px; flex:1; background:var(--bg); border:1px solid var(--line); border-radius:10px; color:var(--txt); padding:10px 12px; font-size:13px; }
    .controls input::placeholder { color:var(--mut); }
    .stats { display:flex; gap:8px; padding:8px 12px 0; flex-wrap:wrap; flex:none; }
    .stat { background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:10px; padding:7px 11px; font-size:12px; color:var(--mut); }
    .stat b { display:block; font-size:16px; margin-top:2px; color:var(--txt); }
    .list { overflow-y:auto; padding:10px 12px 16px; display:grid; gap:9px; flex:1; }
    .empty { padding:22px; text-align:center; color:var(--mut); border:1px dashed var(--line); border-radius:12px; }

    /* ---------- Job rows ---------- */
    .job-row { display:grid; grid-template-columns:32px 1fr; gap:10px; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.05); background:rgba(255,255,255,.02); }
    .job-row.completed { opacity:.6; background:rgba(46,160,67,.08); }
    .job-row.completed .job-ref { text-decoration:line-through; color:var(--mut); }
    .job-row.selected { border-color:rgba(61,139,253,.65); box-shadow:0 0 0 2px rgba(61,139,253,.25); }
    .job-pin { width:32px; height:32px; border-radius:50%; display:grid; place-items:center; color:#fff; font-weight:700; font-size:13px; border:2px solid #fff; }
    .job-ref { font-size:14px; font-weight:700; word-break:break-word; }
    .job-addr { font-size:12px; color:var(--mut); margin-top:5px; word-break:break-word; }
    .job-meta { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
    .chip { font-size:11px; padding:3px 8px; border-radius:999px; border:1px solid var(--line); color:var(--mut); }
    .job-actions { display:flex; gap:7px; margin-top:10px; }
    .job-action { flex:1; border:none; border-radius:10px; padding:9px; color:#fff; font-weight:700; font-size:12px; cursor:pointer; }
    .job-action.nav { background:var(--ok); }
    .job-action.done { background:var(--accent); }
    .job-action:disabled { background:var(--line); color:var(--mut); cursor:not-allowed; }

    /* ---------- Markers ---------- */
    .job-marker { width:20px; height:20px; border-radius:50%; border:2.5px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.45); position:relative; }
    .job-marker.selected { width:26px; height:26px; box-shadow:0 0 0 4px rgba(61,139,253,.55), 0 2px 6px rgba(0,0,0,.45); z-index:1000; }
    .job-marker.completed { background:#8b98a9; }
    .job-marker.completed::before, .job-marker.completed::after { content:''; position:absolute; left:50%; top:50%; width:9px; height:2px; background:#fff; transform-origin:center; }
    .job-marker.completed::before { transform:translate(-50%,-50%) rotate(45deg); }
    .job-marker.completed::after { transform:translate(-50%,-50%) rotate(-45deg); }
    /* Clusters are deliberately NOT circles: a circle with a number always
       means "job N", a rounded square always means "N jobs grouped here". */
    .marker-cluster { width:46px; height:44px; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:10px; color:#fff; border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.5); position:relative; }
    .marker-cluster::before { content:''; position:absolute; top:-5px; left:5px; right:5px; height:5px; border-radius:6px 6px 0 0; background:inherit; opacity:.55; border:2px solid #fff; border-bottom:none; box-sizing:border-box; }
    .marker-cluster b { font-size:16px; font-weight:800; line-height:1; }
    .marker-cluster i { font-size:8px; font-style:normal; letter-spacing:.5px; opacity:.9; margin-top:1px; text-transform:uppercase; }

    /* ---------- Popup ---------- */
    .leaflet-popup-content { margin:12px 14px; }
    .pp { min-width:220px; }
    .pp-head { font-size:14px; font-weight:700; color:#111; padding-bottom:6px; margin-bottom:7px; border-bottom:2px solid; display:flex; align-items:center; gap:8px; }
    .pp-n { color:#fff; border-radius:50%; width:22px; height:22px; font-size:12px; display:inline-flex; align-items:center; justify-content:center; flex:none; }
    .pp-addr { font-size:13px; font-weight:600; color:#111; margin-bottom:3px; }
    .pp-tags { font-size:11px; color:#666; margin-bottom:6px; }
    .pp-desc { font-size:12px; line-height:1.45; color:#222; background:#f2f5f8; border-radius:6px; padding:7px 9px; margin-bottom:7px; }
    .pp-meta { font-size:11px; color:#444; line-height:1.65; margin-bottom:7px; }
    .pp-coords { font-size:11px; color:#555; font-family:ui-monospace,Menlo,monospace; margin-bottom:9px; }
    .pp-btns { display:flex; gap:6px; }
    .pp-btns button { flex:1; border:none; border-radius:8px; padding:9px; font-size:12px; font-weight:700; color:#fff; cursor:pointer; }
    .pp-copy { background:#3d8bfd; }
    .pp-nav { background:#2ea043; }

    .toast { position:fixed; left:50%; bottom:20px; transform:translateX(-50%); background:#111a24; border:1px solid var(--line); padding:11px 16px; border-radius:999px; display:none; z-index:2000; font-size:13px; max-width:90%; text-align:center; }

    /* Detail modal - used when the map pane is too short to show a popup */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:3000; padding:16px; }
    .modal.open { display:flex; }
    .modal-card { background:#fff; border-radius:14px; width:100%; max-width:420px; max-height:80vh; overflow-y:auto; padding:16px; position:relative; }
    .modal-close { position:absolute; top:8px; right:10px; background:none; border:none; font-size:24px; line-height:1; color:#888; cursor:pointer; padding:4px 8px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Job Map</h1>
      <span class="version" id="version"></span>
      <div class="header-right">
        <span class="pill alert" id="overduePill" hidden></span>
        <span class="pill" id="statusPill">No data loaded</span>
        <label class="file-button">Load file<input id="fileInput" type="file" accept=".xlsx,.xls,.csv" hidden></label>
      </div>
    </header>

    <div class="stale-bar" id="staleBar"></div>

    <div class="map-container">
      <div id="map"></div>
      <div class="legend">
        <span><i style="background:#f0546c"></i>Overdue</span>
        <span><i style="background:#d29922"></i>Due today</span>
        <span><i style="background:#2ea043"></i>Future</span>
        <span><i style="background:#8b98a9;border-radius:3px"></i>Square = grouped jobs</span>
      </div>
    </div>

    <div class="drag-bar" id="dragBar" title="Drag to resize - double-tap to collapse"></div>

    <div class="sheet" id="sheet">
      <div class="controls">
        <input id="searchInput" type="search" placeholder="Search ref, street, description" />
        <select id="gangFilter"><option value="__all">All gangs</option></select>
        <select id="dateFilter"><option value="__all">All planned dates</option></select>
        <select id="completionFilter">
          <option value="active">Active only</option>
          <option value="__all">All jobs</option>
          <option value="completed">Completed only</option>
        </select>
        <select id="sortFilter">
          <option value="spreadsheet">Spreadsheet order</option>
          <option value="duedate">Completion date</option>
          <option value="planned">Planned start</option>
          <option value="ref">Job reference</option>
          <option value="addr">Address</option>
          <option value="distance">Nearest first</option>
        </select>
        <button class="button" id="todayButton">Today</button>
        <button class="button" id="fitButton">Fit</button>
        <button class="button" id="locateButton">Locate</button>
      </div>
      <div class="stats" id="statsPanel"></div>
      <div class="list" id="jobList"><div class="empty">Load the daily export to see jobs on the map.</div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <div class="modal" id="detailModal">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
  /* =========================================================
     JOB MAP
     Reads the daily Causeway K01 export (.xlsx).
     NOTE: "Mark done" is stored on THIS PHONE ONLY.
     It does not update Causeway.
     ========================================================= */

  var VERSION = 'v2.2';
  var STORAGE_KEY = 'job-map-v2';
  var CLUSTER_OFF_AT_ZOOM = 14;              // individual pins at/above this zoom
  var URG = { over:'#f0546c', today:'#d29922', future:'#2ea043', none:'#8b98a9' };

  /* ---------- Column config (spreadsheet letters) ----------
     If the export layout ever shifts, change these letters.  */
  var COL_LETTERS = {
    ref:'B', operative:'C', category:'H', town:'J', street:'K', status:'L',
    task:'M', desc:'N',
    requiredCompletion:'O',   // pin COLOUR keyed to this
    plannedStart:'R',         // date FILTER keyed to this
    lat:'AC', lng:'AD', jobType:'W', note:'AK', fullAddr:'AL', tm:'AR'
  };

  /* Optional header matching, used only if the export gains a header row.
     Deliberately conservative: no "easting"/"northing" (grid metres, not
     degrees), and no terms shared between two fields.        */
  var HEADER_SYNONYMS = {
    ref:['ref','reference','job ref','job reference','job number','job no'],
    operative:['operative','engineer','technician','operative name'],
    category:['category','work category'],
    town:['town','city','post town'],
    street:['street','address','street address','road','address line 1'],
    fullAddr:['full address','combined address','address full'],
    status:['status','job status','state'],
    task:['gang','task','gang code','team','work gang'],
    desc:['description','job description','works description','detail','details'],
    requiredCompletion:['required completion','required completion date','completion date','complete by','due date','due by'],
    plannedStart:['planned start','planned start date','planned date','start date'],
    lat:['lat','latitude'],
    lng:['lng','lon','long','longitude'],
    note:['note','notes','comments','additional notes'],
    jobType:['job type','task type','work type'],
    tm:['tm','traffic management','traffic management requirement']
  };

  /* ---------- State ---------- */
  var map, markerCluster;
  var jobs = [], filteredJobs = [], completedSet = new Set(), userLocation = null;
  var selectedJobId = null, fileLabel = '', loadedAt = null;
  var state = { search:'', gang:'__all', date:'__all', completion:'active', sort:'spreadsheet', sheetH:'', collapsed:false };

  /* ---------- Utilities ---------- */
  function colIndex(letter) {
    var v = 0, s = letter.toUpperCase();
    for (var i = 0; i < s.length; i++) v = v * 26 + (s.charCodeAt(i) - 64);
    return v - 1;
  }
  var COL = {};
  Object.keys(COL_LETTERS).forEach(function (k) { COL[k] = colIndex(COL_LETTERS[k]); });

  function toDate(v) {
    if (v instanceof Date) return isNaN(v.getTime()) ? null : v;
    if (typeof v === 'number') return new Date(Math.round((v - 25569) * 86400 * 1000));
    if (typeof v === 'string' && v.trim()) { var d = new Date(v); return isNaN(d.getTime()) ? null : d; }
    return null;
  }
  // Always build date keys from LOCAL parts. toISOString() would shift a UK
  // date back a day during BST, which is the day-out bug we hit before.
  function ymd(d) {
    if (!d) return '';
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function dateFromYmd(s) { var p = String(s).split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
  function nice(d) { return d ? d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' }) : ''; }
  function todayYmd() { return ymd(new Date()); }
  function midnight(d) { var x = new Date(d); x.setHours(0,0,0,0); return x; }
  function daysFromToday(d) { return Math.round((midnight(d) - midnight(new Date())) / 86400000); }

  function urgencyColor(d) {
    if (!d) return URG.none;
    var diff = daysFromToday(d);
    return diff < 0 ? URG.over : diff === 0 ? URG.today : URG.future;
  }
  function urgencyLabel(d) {
    if (!d) return 'No completion date';
    var diff = daysFromToday(d);
    if (diff < 0) return Math.abs(diff) + 'd overdue';
    if (diff === 0) return 'Due today';
    return 'Due in ' + diff + 'd';
  }
  function priorityOf(job) {
    if (!job.complete) return 2;
    var diff = daysFromToday(job.complete);
    return diff < 0 ? 0 : diff === 0 ? 1 : 2;
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(window._tt);
    window._tt = setTimeout(function () { el.style.display = 'none'; }, 2600);
  }

  /* ---------- Import ---------- */
  function normHeader(v) {
    return String(v || '').trim().toLowerCase().replace(/\s+/g, ' ').replace(/[^a-z0-9 ]/g, '');
  }
  function buildHeaderMap(row) {
    var out = {};
    if (!Array.isArray(row)) return out;
    row.forEach(function (cellVal, i) {
      var n = normHeader(cellVal);
      if (!n) return;
      var fields = Object.keys(HEADER_SYNONYMS);
      for (var f = 0; f < fields.length; f++) {
        var field = fields[f];
        if (out[field] == null && HEADER_SYNONYMS[field].indexOf(n) !== -1) { out[field] = i; return; }
      }
    });
    return out;
  }
  function cell(row, field, hmap) {
    if (!Array.isArray(row)) return undefined;
    if (hmap[field] != null) return row[hmap[field]];
    return COL[field] != null ? row[COL[field]] : undefined;
  }
  function cleanDesc(v) {
    return String(v || '').split(';').map(function (s) { return s.trim(); }).filter(Boolean).join(' - ');
  }
  function atNumber(full) {
    var parts = String(full || '').split(';').map(function (s) { return s.trim(); });
    for (var i = 0; i < parts.length; i++) if (/^at\s+number/i.test(parts[i])) return parts[i];
    return '';
  }

  function parseRows(rows) {
    var hmap = buildHeaderMap(rows[0]);
    var hasHeader = Object.keys(hmap).length >= 3;
    var body = hasHeader ? rows.slice(1) : rows;

    return body.map(function (row, i) {
      var lat = parseFloat(cell(row, 'lat', hmap));
      var lng = parseFloat(cell(row, 'lng', hmap));
      var ref = String(cell(row, 'ref', hmap) || '').trim();
      var street = String(cell(row, 'street', hmap) || '');
      var town = String(cell(row, 'town', hmap) || '');
      var fullAddr = String(cell(row, 'fullAddr', hmap) || '');
      var start = toDate(cell(row, 'plannedStart', hmap));
      var complete = toDate(cell(row, 'requiredCompletion', hmap));

      // ID is keyed to the job reference, so "done" marks survive a new export.
      var id = ref ? 'ref:' + ref : 'row:' + i;
      var addr = [street, town].filter(Boolean).join(', ') || fullAddr;

      return {
        id: id,
        ref: ref,
        street: street,
        town: town,
        fullAddr: fullAddr,
        addr: addr,
        atNo: atNumber(fullAddr),
        status: String(cell(row, 'status', hmap) || ''),
        jobType: String(cell(row, 'jobType', hmap) || ''),
        category: String(cell(row, 'category', hmap) || ''),
        desc: cleanDesc(cell(row, 'desc', hmap)),
        note: String(cell(row, 'note', hmap) || ''),
        tm: String(cell(row, 'tm', hmap) || ''),
        operative: String(cell(row, 'operative', hmap) || ''),
        gang: String(cell(row, 'task', hmap) || ''),
        lat: isFinite(lat) ? lat : null,
        lng: isFinite(lng) ? lng : null,
        start: start,
        complete: complete,
        startYmd: ymd(start),
        displayNum: 0,
        marker: null
      };
    }).filter(function (j) { return j.ref || j.lat != null; });
  }

  function readFile(file) {
    return file.arrayBuffer().then(function (buf) {
      var wb = XLSX.read(new Uint8Array(buf), { type:'array', cellDates:true });
      var sheet = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(sheet, { header:1, raw:true });
      if (!rows.length) throw new Error('That sheet is empty.');
      var parsed = parseRows(rows);
      if (!parsed.length) throw new Error('No job rows found - check the export layout.');
      return parsed;
    });
  }

  /* ---------- Persistence ---------- */
  function saveState() {
    try {
      var slim = jobs.map(function (j) {
        var c = {};
        Object.keys(j).forEach(function (k) { if (k !== 'marker') c[k] = j[k]; });
        c.start = j.start ? j.start.toISOString() : null;
        c.complete = j.complete ? j.complete.toISOString() : null;
        return c;
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        jobs: slim,
        completed: Array.from(completedSet),
        state: state,
        fileLabel: fileLabel,
        loadedAt: loadedAt ? loadedAt.toISOString() : null
      }));
    } catch (e) { /* quota / private mode - non-fatal */ }
  }
  function restoreState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      var saved = JSON.parse(raw);
      jobs = (saved.jobs || []).map(function (j) {
        j.start = j.start ? new Date(j.start) : null;
        j.complete = j.complete ? new Date(j.complete) : null;
        j.marker = null;
        return j;
      });
      completedSet = new Set(saved.completed || []);
      if (saved.state) Object.keys(saved.state).forEach(function (k) { state[k] = saved.state[k]; });
      fileLabel = saved.fileLabel || '';
      loadedAt = saved.loadedAt ? new Date(saved.loadedAt) : null;
      return jobs.length > 0;
    } catch (e) { return false; }
  }

  /* ---------- Map ---------- */
  function initMap() {
    map = L.map('map', { zoomControl:true }).setView([52.057, -2.70], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom:20, subdomains:'abcd', crossOrigin:true,
      attribution:'&copy; OpenStreetMap &copy; CARTO'
    }).addTo(map);

    markerCluster = L.markerClusterGroup({
      chunkedLoading: true,
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      disableClusteringAtZoom: CLUSTER_OFF_AT_ZOOM,  // pins, not clusters, at working zoom
      maxClusterRadius: 55,
      iconCreateFunction: function (cluster) {
        var kids = cluster.getAllChildMarkers();
        // A cluster takes the colour of its most urgent job.
        var worst = 2;
        kids.forEach(function (m) { if (m.options.priority < worst) worst = m.options.priority; });
        var color = worst === 0 ? URG.over : worst === 1 ? URG.today : URG.future;
        return L.divIcon({
          html: '<div class="marker-cluster" style="background:' + color + '">' +
                  '<b>' + kids.length + '</b><i>jobs</i>' +
                '</div>',
          className: '', iconSize: [46,44], iconAnchor: [23,22]
        });
      }
    });
    map.addLayer(markerCluster);

    var kick = function () { map.invalidateSize(); };
    [0, 150, 400, 800].forEach(function (t) { setTimeout(kick, t); });
    window.addEventListener('resize', kick);
    if (window.ResizeObserver) new ResizeObserver(kick).observe(document.querySelector('.map-container'));
  }

  function markerIcon(job, done) {
    var color = done ? '#8b98a9' : urgencyColor(job.complete);
    var sel = (selectedJobId === job.id);
    var cls = 'job-marker' + (done ? ' completed' : '') + (sel ? ' selected' : '');
    var size = sel ? 26 : 20;
    return L.divIcon({
      html: '<div class="' + cls + '" style="background:' + color + '"></div>',
      className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2]
    });
  }

  // Only the FILTERED jobs go on the map, so cluster counts always mean
  // "jobs still to do here" (completed jobs drop off by default).
  function syncMarkers() {
    markerCluster.clearLayers();
    var live = [];
    filteredJobs.forEach(function (job) {
      if (job.lat == null || job.lng == null) return;
      var done = completedSet.has(job.id);
      if (!job.marker) {
        job.marker = L.marker([job.lat, job.lng], { icon: markerIcon(job, done), priority: priorityOf(job) });
        job.marker.on('click', function () { selectJob(job.id, false); });
      } else {
        job.marker.setIcon(markerIcon(job, done));
        job.marker.options.priority = priorityOf(job);
      }
      job.marker.bindPopup(popupHtml(job), {
        maxWidth: 300,
        keepInView: true,                       // never let the popup sit off-screen
        autoPan: true,
        autoPanPadding: [16, 16],
        maxHeight: Math.max(120, mapHeight() - 90)  // scroll inside rather than overflow
      });
      live.push(job.marker);
    });
    markerCluster.addLayers(live);
  }

  function mapHeight() {
    var el = document.querySelector('.map-container');
    return el ? el.clientHeight : 400;
  }

  // If the map pane is too short, a Leaflet popup can't fit and Leaflet ends up
  // panning the marker out of view. Below this height, show a modal card instead.
  var MIN_HEIGHT_FOR_POPUP = 300;

  function openDetails(job) {
    if (job.lat == null) return;
    if (mapHeight() >= MIN_HEIGHT_FOR_POPUP && job.marker) {
      map.setView([job.lat, job.lng], Math.max(map.getZoom(), CLUSTER_OFF_AT_ZOOM));
      markerCluster.zoomToShowLayer(job.marker, function () { job.marker.openPopup(); });
    } else {
      document.getElementById('modalBody').innerHTML = popupHtml(job);
      document.getElementById('detailModal').classList.add('open');
    }
  }
  function closeDetails() {
    document.getElementById('detailModal').classList.remove('open');
  }
  window.closeDetails = closeDetails;

  function fitToFilter() {
    var pts = [];
    filteredJobs.forEach(function (j) { if (j.lat != null) pts.push([j.lat, j.lng]); });
    if (!pts.length) return;
    map.fitBounds(L.latLngBounds(pts).pad(0.18), { maxZoom: 15 });
  }

  /* ---------- Popup ---------- */
  function popupHtml(job) {
    var color = urgencyColor(job.complete);
    var parts = [];

    if (job.addr) parts.push('<div class="pp-addr">' + esc(job.addr) + (job.atNo ? ' - ' + esc(job.atNo) : '') + '</div>');
    var tags = [job.jobType, job.category].filter(Boolean).map(esc).join(' / ');
    if (tags) parts.push('<div class="pp-tags">' + tags + '</div>');
    if (job.desc) parts.push('<div class="pp-desc">' + esc(job.desc) + '</div>');

    var meta = [];
    if (job.start) meta.push('Planned start: ' + nice(job.start));
    if (job.complete) meta.push('Complete by: ' + nice(job.complete) + ' (' + urgencyLabel(job.complete) + ')');
    if (job.tm) meta.push('TM: ' + esc(job.tm));
    if (job.status) meta.push('Status: ' + esc(job.status));
    if (job.note) meta.push(esc(job.note));
    parts.push('<div class="pp-meta">' + meta.join('<br>') + '</div>');

    if (job.lat != null) {
      parts.push('<div class="pp-coords">' + job.lat.toFixed(6) + ', ' + job.lng.toFixed(6) + '</div>');
      parts.push('<div class="pp-btns">' +
        '<button class="pp-copy" onclick="copyCoords(' + job.lat + ',' + job.lng + ')">Copy coords</button>' +
        '<button class="pp-nav" onclick="showOnMaps(' + job.lat + ',' + job.lng + ',&quot;' + esc(job.ref) + '&quot;)">Open in Maps</button>' +
        '</div>');
    }

    return '<div class="pp">' +
      '<div class="pp-head" style="border-color:' + color + '">' +
        '<span class="pp-n" style="background:' + color + '">' + (job.displayNum || '') + '</span>' +
        esc(job.ref || 'Job') +
      '</div>' + parts.join('') + '</div>';
  }

  /* Uses the geo: URI scheme, NOT an https link.
     Link-rewriters such as Mimecast only touch http/https, so this passes
     straight through to Google Maps. It DROPS A PIN at the job rather than
     forcing turn-by-turn - the gang taps Directions themselves if they want it. */
  function showOnMaps(lat, lng, ref) {
    if (lat == null || lng == null) return;
    window.location.href = 'geo:0,0?q=' + lat + ',' + lng + '(' + encodeURIComponent(ref || 'Job') + ')';
  }
  function copyCoords(lat, lng) {
    var txt = lat + ',' + lng;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(
        function () { toast('Copied ' + txt + ' - paste into Google Maps'); },
        function () { prompt('Copy these coordinates:', txt); }
      );
    } else {
      prompt('Copy these coordinates:', txt);
    }
  }
  window.showOnMaps = showOnMaps;
  window.copyCoords = copyCoords;

  /* ---------- Filtering ---------- */
  function cmp(a, b) {
    return String(a || '').localeCompare(String(b || ''), undefined, { sensitivity:'base' });
  }
  function distanceOf(job) {
    if (!userLocation || job.lat == null) return Number.MAX_SAFE_INTEGER;
    var dx = job.lat - userLocation.lat, dy = job.lng - userLocation.lng;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function applyFilters() {
    var q = state.search.trim().toLowerCase();

    filteredJobs = jobs.filter(function (job) {
      var done = completedSet.has(job.id);
      if (state.completion === 'active' && done) return false;
      if (state.completion === 'completed' && !done) return false;
      if (state.gang !== '__all' && job.gang !== state.gang) return false;
      if (state.date !== '__all' && job.startYmd !== state.date) return false;
      if (q) {
        var hay = [job.ref, job.addr, job.desc, job.gang, job.jobType, job.note].join(' ').toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });

    var time = function (d) { return d ? new Date(d).getTime() : 9e15; };
    var sorters = {
      spreadsheet: function () { return 0; },
      duedate: function (a, b) { return (time(a.complete) - time(b.complete)) || cmp(a.ref, b.ref); },
      planned:  function (a, b) { return (time(a.start) - time(b.start)) || cmp(a.ref, b.ref); },
      ref:      function (a, b) { return cmp(a.ref, b.ref); },
      addr:     function (a, b) { return cmp(a.addr, b.addr); },
      distance: function (a, b) { return userLocation ? (distanceOf(a) - distanceOf(b)) : cmp(a.ref, b.ref); }
    };
    filteredJobs.sort(sorters[state.sort] || sorters.spreadsheet);

    // Pin numbers and list numbers must always agree.
    filteredJobs.forEach(function (job, i) { job.displayNum = i + 1; });
  }

  /* ---------- Rendering ---------- */
  function rebuildDropdowns() {
    var gangSel = document.getElementById('gangFilter');
    var dateSel = document.getElementById('dateFilter');

    var gangs = [];
    jobs.forEach(function (j) { if (j.gang && gangs.indexOf(j.gang) === -1) gangs.push(j.gang); });
    gangs.sort();

    gangSel.innerHTML = '<option value="__all">All gangs (' + jobs.length + ')</option>';
    gangs.forEach(function (g) {
      var n = jobs.filter(function (j) { return j.gang === g; }).length;
      gangSel.insertAdjacentHTML('beforeend',
        '<option value="' + esc(g) + '">' + esc(g) + ' (' + n + ')</option>');
    });
    gangSel.value = gangs.indexOf(state.gang) !== -1 ? state.gang : '__all';
    state.gang = gangSel.value;

    var pool = state.gang === '__all' ? jobs : jobs.filter(function (j) { return j.gang === state.gang; });
    var dates = [];
    pool.forEach(function (j) { if (j.startYmd && dates.indexOf(j.startYmd) === -1) dates.push(j.startYmd); });
    dates.sort();

    dateSel.innerHTML = '<option value="__all">All planned dates (' + pool.length + ')</option>';
    dates.forEach(function (d) {
      var n = pool.filter(function (j) { return j.startYmd === d; }).length;
      var todayTag = (d === todayYmd()) ? ' - today' : '';
      dateSel.insertAdjacentHTML('beforeend',
        '<option value="' + d + '">' + nice(dateFromYmd(d)) + todayTag + ' (' + n + ')</option>');
    });
    dateSel.value = dates.indexOf(state.date) !== -1 ? state.date : '__all';
    state.date = dateSel.value;
  }

  function renderStats() {
    var active = jobs.filter(function (j) { return !completedSet.has(j.id); });
    var overdue = active.filter(function (j) { return j.complete && daysFromToday(j.complete) < 0; }).length;
    var dueToday = active.filter(function (j) { return j.complete && daysFromToday(j.complete) === 0; }).length;
    var noCoords = jobs.filter(function (j) { return j.lat == null; }).length;

    document.getElementById('statsPanel').innerHTML =
      '<div class="stat">Showing<b>' + filteredJobs.length + '</b></div>' +
      '<div class="stat">Overdue<b style="color:' + URG.over + '">' + overdue + '</b></div>' +
      '<div class="stat">Due today<b style="color:' + URG.today + '">' + dueToday + '</b></div>' +
      '<div class="stat">Done<b style="color:' + URG.future + '">' + completedSet.size + '</b></div>' +
      (noCoords ? '<div class="stat">No coords<b>' + noCoords + '</b></div>' : '');

    var pill = document.getElementById('overduePill');
    if (overdue > 0) { pill.hidden = false; pill.textContent = overdue + ' overdue'; }
    else pill.hidden = true;
  }

  function renderList() {
    var list = document.getElementById('jobList');
    list.innerHTML = '';

    if (!jobs.length) {
      list.innerHTML = '<div class="empty">Load the daily export to see jobs on the map.</div>';
      return;
    }
    if (!filteredJobs.length) {
      list.innerHTML = '<div class="empty">No jobs match the current filters.</div>';
      return;
    }

    filteredJobs.forEach(function (job) {
      var missing = job.lat == null;
      var done = completedSet.has(job.id);
      var color = done ? '#8b98a9' : urgencyColor(job.complete);

      var row = document.createElement('div');
      row.className = 'job-row' + (done ? ' completed' : '') + (selectedJobId === job.id ? ' selected' : '');
      row.setAttribute('data-id', job.id);
      row.innerHTML =
        '<div class="job-pin" style="background:' + (missing ? 'var(--line)' : color) + '">' +
          (missing ? '!' : job.displayNum) +
        '</div>' +
        '<div>' +
          '<div class="job-ref">' + esc(job.ref || 'No reference') + '</div>' +
          '<div class="job-addr">' + esc(job.addr || 'No address') + (missing ? ' - no coordinates' : '') + '</div>' +
          '<div class="job-meta">' +
            (job.jobType ? '<span class="chip">' + esc(job.jobType) + '</span>' : '') +
            (job.start ? '<span class="chip">Start ' + nice(job.start) + '</span>' : '') +
            (job.complete ? '<span class="chip" style="color:' + color + ';border-color:' + color + '">' + urgencyLabel(job.complete) + '</span>' : '') +
          '</div>' +
          '<div class="job-actions">' +
            '<button class="job-action nav"' + (missing ? ' disabled' : '') + '>Open in Maps</button>' +
            '<button class="job-action done">' + (done ? 'Undo done' : 'Mark done (my phone)') + '</button>' +
          '</div>' +
        '</div>';

      row.querySelector('.job-ref').onclick = function () { if (!missing) selectJob(job.id, true); };
      row.querySelector('.job-addr').onclick = function () { if (!missing) selectJob(job.id, true); };
      if (!missing) {
        row.querySelector('.nav').onclick = function (e) {
          e.stopPropagation();
          showOnMaps(job.lat, job.lng, job.ref);
        };
      }
      row.querySelector('.done').onclick = function (e) {
        e.stopPropagation();
        toggleDone(job.id);
      };
      list.appendChild(row);
    });
  }

  // Icon-only repaint. Does NOT clear layers, so an open popup stays open.
  function refreshMarkerIcons() {
    filteredJobs.forEach(function (job) {
      if (job.marker) job.marker.setIcon(markerIcon(job, completedSet.has(job.id)));
    });
  }

  function selectJob(id, panTo) {
    selectedJobId = id;
    var job = null;
    for (var i = 0; i < jobs.length; i++) if (jobs[i].id === id) { job = jobs[i]; break; }
    renderList();
    refreshMarkerIcons();   // highlight the selected pin without closing its popup
    var row = document.querySelector('[data-id="' + id + '"]');
    if (row) row.scrollIntoView({ behavior:'smooth', block:'center' });
    if (job && panTo) openDetails(job);
  }

  function toggleDone(id) {
    if (completedSet.has(id)) completedSet['delete'](id); else completedSet.add(id);
    toast(completedSet.has(id) ? 'Marked done (this phone only)' : 'Restored');
    render();
  }

  /* ---------- Stale-data check ---------- */
  function checkStale() {
    var bar = document.getElementById('staleBar');
    if (!jobs.length) { bar.className = 'stale-bar'; return; }

    var times = [];
    jobs.forEach(function (j) { if (j.start) times.push(j.start.getTime()); });
    if (!times.length) { bar.className = 'stale-bar'; return; }

    var latest = new Date(Math.max.apply(null, times));
    var diff = daysFromToday(latest);
    if (diff < 0) {
      var n = Math.abs(diff);
      bar.className = 'stale-bar show';
      bar.textContent = 'This export looks out of date - the latest planned start in it is ' +
        nice(latest) + ', ' + n + ' day' + (n === 1 ? '' : 's') + ' ago. Check for a newer file.';
    } else {
      bar.className = 'stale-bar';
    }
  }

  function render() {
    applyFilters();
    renderStats();
    renderList();
    syncMarkers();
    checkStale();
    saveState();
  }

  /* ---------- Resizable / collapsible list ---------- */
  function initResizer() {
    var bar = document.getElementById('dragBar');
    var sheet = document.getElementById('sheet');
    var dragging = false;

    // Never let the list squeeze the map below MIN_MAP_PX - that was what
    // pushed job pins off-screen when the popup tried to open.
    var MIN_MAP_PX = 240;

    function setHeight(px) {
      var max = window.innerHeight - MIN_MAP_PX;
      var h = Math.max(0, Math.min(max, px));
      document.documentElement.style.setProperty('--sheet-h', h + 'px');
      state.sheetH = h + 'px';
      map.invalidateSize();
    }

    bar.addEventListener('pointerdown', function (e) {
      dragging = true;
      bar.setPointerCapture(e.pointerId);
    });
    bar.addEventListener('pointermove', function (e) {
      if (dragging) setHeight(window.innerHeight - e.clientY);
    });
    bar.addEventListener('pointerup', function (e) {
      dragging = false;
      try { bar.releasePointerCapture(e.pointerId); } catch (err) {}
      saveState();
    });

    // Double-tap the handle to collapse / restore the list.
    var lastTap = 0;
    bar.addEventListener('click', function () {
      var now = Date.now();
      if (now - lastTap < 350) {
        state.collapsed = !state.collapsed;
        sheet.classList.toggle('collapsed', state.collapsed);
        map.invalidateSize();
        saveState();
      }
      lastTap = now;
    });

    if (state.sheetH) document.documentElement.style.setProperty('--sheet-h', state.sheetH);
    sheet.classList.toggle('collapsed', !!state.collapsed);
  }

  /* ---------- Startup ---------- */
  function applyStateToControls() {
    document.getElementById('searchInput').value = state.search || '';
    document.getElementById('completionFilter').value = state.completion;
    document.getElementById('sortFilter').value = state.sort;
  }

  function setStatus() {
    var pill = document.getElementById('statusPill');
    if (!jobs.length) { pill.textContent = 'No data loaded'; return; }
    var when = loadedAt
      ? loadedAt.toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
      : '';
    pill.textContent = jobs.length + ' jobs' + (when ? ' - loaded ' + when : '');
  }

  function init() {
    document.getElementById('version').textContent = VERSION;
    initMap();

    document.getElementById('fileInput').addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;
      readFile(file).then(function (parsed) {
        jobs = parsed;                 // completedSet is intentionally NOT cleared:
        fileLabel = file.name;         // IDs are ref-based, so "done" carries over.
        loadedAt = new Date();
        rebuildDropdowns();
        applyStateToControls();
        render();
        fitToFilter();
        setStatus();
        toast('Loaded ' + jobs.length + ' jobs');
      })['catch'](function (err) {
        console.error(err);
        toast(err.message || 'Could not read that file');
      });
    });

    document.getElementById('searchInput').addEventListener('input', function (e) {
      state.search = e.target.value; render();
    });
    document.getElementById('gangFilter').addEventListener('change', function (e) {
      state.gang = e.target.value; rebuildDropdowns(); render(); fitToFilter();
    });
    document.getElementById('dateFilter').addEventListener('change', function (e) {
      state.date = e.target.value; render(); fitToFilter();
    });
    document.getElementById('completionFilter').addEventListener('change', function (e) {
      state.completion = e.target.value; render();
    });
    document.getElementById('sortFilter').addEventListener('change', function (e) {
      state.sort = e.target.value; render();
    });

    document.getElementById('todayButton').addEventListener('click', function () {
      var sel = document.getElementById('dateFilter');
      var t = todayYmd();
      var found = false;
      for (var i = 0; i < sel.options.length; i++) if (sel.options[i].value === t) found = true;
      if (found) {
        sel.value = t; state.date = t; render(); fitToFilter();
      } else {
        toast('No jobs planned to start today');
      }
    });

    document.getElementById('fitButton').addEventListener('click', fitToFilter);

    document.getElementById('locateButton').addEventListener('click', function () {
      if (!navigator.geolocation) { toast('GPS unavailable'); return; }
      navigator.geolocation.getCurrentPosition(function (p) {
        userLocation = { lat: p.coords.latitude, lng: p.coords.longitude };
        L.circleMarker([userLocation.lat, userLocation.lng], {
          radius:8, color:'#fff', fillColor:'#3d8bfd', fillOpacity:1, weight:2
        }).addTo(map).bindPopup('You are here');
        map.setView([userLocation.lat, userLocation.lng], 14);
        render();
      }, function () { toast('Unable to get your location'); });
    });

    document.getElementById('modalClose').addEventListener('click', closeDetails);
    document.getElementById('detailModal').addEventListener('click', function (e) {
      if (e.target.id === 'detailModal') closeDetails();   // tap backdrop to close
    });

    initResizer();

    if (restoreState()) {
      rebuildDropdowns();
      applyStateToControls();
      render();
      setStatus();
    }
  }

  init();
  </script>
</body>
</html>
